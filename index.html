<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#183a37">
  <meta name="description" content="英検1級スピーチ向け・2者間の関係を表す全66例文の瞬間英作文トレーナー">
  <title>Relation Sprint｜瞬間英作文</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23183a37'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='Georgia' font-size='39' font-weight='700' fill='%23f5f2e9'%3ER%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#" data-action="go-train" aria-label="Relation Sprint ホーム">
      <span class="brand-mark">R</span>
      <span><strong>Relation Sprint</strong><small>英検1級・瞬間英作文</small></span>
    </a>
    <nav class="main-nav" aria-label="メインメニュー">
      <button class="nav-item is-active" data-view="train">トレーニング</button>
      <button class="nav-item" data-view="library">全例文</button>
      <button class="nav-item" data-view="patterns">型一覧</button>
    </nav>
    <div class="header-actions">
      <button class="account-button" data-action="open-auth"><span class="cloud-dot"></span><span id="accountLabel">ログイン</span></button>
      <button class="icon-button" data-action="open-settings" aria-label="学習データの設定" title="設定">•••</button>
    </div>
  </header>

  <main id="app" tabindex="-1"></main>

  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog">
      <div class="dialog-head">
        <div><span class="eyebrow">LOCAL DATA</span><h2>学習データ</h2></div>
        <button class="icon-button" value="close" aria-label="閉じる">×</button>
      </div>
      <p>進捗は常にこのブラウザへ保存されます。ログイン中はSupabaseにも同期され、未ログイン時はJSONで移行できます。</p>
      <div class="dialog-actions">
        <button type="button" class="secondary-button" data-action="export-progress">進捗を書き出す</button>
        <label class="secondary-button file-button">進捗を読み込む<input id="importProgress" type="file" accept="application/json"></label>
        <button type="button" class="danger-button" data-action="reset-progress">進捗をリセット</button>
      </div>
    </form>
  </dialog>

  <dialog id="authDialog" class="settings-dialog auth-dialog">
    <form id="authForm">
      <div class="dialog-head">
        <div><span class="eyebrow">CLOUD SYNC</span><h2 id="authDialogTitle">アカウント同期</h2></div>
        <button type="button" class="icon-button" data-action="close-auth" aria-label="閉じる">×</button>
      </div>
      <div id="authSignedOut">
        <p>メールアドレスでログインすると、学習進捗を複数端末で同期できます。</p>
        <label class="auth-field">メールアドレス<input id="authEmail" type="email" autocomplete="email" required placeholder="you@example.com"></label>
        <label class="auth-field">パスワード<input id="authPassword" type="password" autocomplete="current-password" minlength="8" required placeholder="8文字以上"></label>
        <p id="authMessage" class="auth-message" role="status"></p>
        <button type="submit" class="primary-button auth-submit">ログイン</button>
        <button type="button" class="text-button" data-action="toggle-auth-mode">初めての方：アカウントを作成</button>
      </div>
      <div id="authSignedIn" hidden>
        <div class="account-card"><span>ログイン中</span><strong id="signedInEmail"></strong><small id="syncStatusText">同期状態を確認中…</small></div>
        <div class="dialog-actions">
          <button type="button" class="secondary-button" data-action="sync-now">今すぐ同期</button>
          <button type="button" class="danger-button" data-action="sign-out">ログアウト</button>
        </div>
      </div>
    </form>
  </dialog>

  <footer>
    <span>Relation Sprint</span>
    <span>全66例文・オフライン対応</span>
  </footer>

  <script src="data.js"></script>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
